<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Risk Management</title>
  <link rel="icon" type="image/png" href="/brand_assets/riskicon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ══════════════════════════════════════
     AUTH SCREEN
══════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-center">
    <div class="auth-logo-block">
      <img src="brand_assets/risklogo.png" alt="Risk Universalis" class="auth-logo-img" onerror="this.style.display='none'" />
      <h1 class="auth-brand-name">Risk Universalis</h1>
      <p class="auth-brand-sub">Workspace Platform</p>
    </div>

    <div class="auth-card">
      <!-- Step 1: Email -->
      <div id="step-email">
        <h2 class="auth-heading">Sign in to your workspace</h2>
        <p class="auth-subtext">Enter your work email to continue.</p>
        <div class="auth-field">
          <input type="email" id="email-input" class="auth-input" placeholder="name@company.com" autocomplete="email" />
          <p class="auth-error" id="email-error">Access denied — email not recognized.</p>
        </div>
        <button class="btn-primary btn-full" id="continue-btn">Continue</button>
      </div>

      <!-- Step 2: OTP -->
      <div id="step-code" class="hidden">
        <h2 class="auth-heading">Check your inbox</h2>
        <p class="auth-subtext">We sent an 8-digit code to <strong id="masked-email"></strong></p>
        <div class="otp-row" id="otp-row">
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
          <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        </div>
        <p class="auth-hint">Enter the 8-digit code from your email</p>
        <button class="btn-link" id="back-btn">← Use a different email</button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     APP SHELL
══════════════════════════════════════ -->
<div id="app" class="app-hidden">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <span class="sidebar-sub">Workspace</span>
        </div>
        <button class="theme-btn" id="theme-btn" title="Toggle theme"></button>
      </div>
      <div class="sidebar-logo-wrap">
        <img src="brand_assets/risklogo.png" alt="Risk Universalis" class="sidebar-logo" />
      </div>

      <nav class="sidebar-nav" id="sidebar-nav">
        <a class="nav-item" data-view="overview" href="#">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
          Overview
        </a>
        <a class="nav-item" data-view="projects" href="#">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          Projects
        </a>
        <a class="nav-item" data-view="tracker" href="#">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="23 11 17 11"/><line x1="20" y1="8" x2="20" y2="14"/></svg>
          Tracker
        </a>
        <a class="nav-item" data-view="invoices" href="#">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Invoices
        </a>
        <a class="nav-item" data-view="members" href="#">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Members
        </a>
        <a class="nav-item" data-view="statistics" href="#">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Statistics
        </a>
      </nav>
    </div>

    <div class="sidebar-mid">
      <p class="sidebar-label">Team</p>
      <div id="team-list"></div>
    </div>

    <div class="sidebar-foot">
      <div id="sidebar-user-foot"></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <div id="view-wrap" class="view-wrap"></div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
